<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Mini Landing Page</title>
        <link rel="stylesheet" href="styling/style.css">
    </head>

    <body>
        <!-- background img -->
        <div class="background"></div>

        <!-- main container -->
        <div class="container">
            <!-- header -->
            <header class="header">
                <h1>Welcome to Peachie's Landing Page</h1>
                <p>A cute little website...</p>
            </header>

            <!-- nav tabs -->
            <div class="tabs">
                <button class="tab-button active" data-tab="home">Home</button>
                <button class="tab-button" data-tab="gallery">Gallery</button>
                <button class="tab-button" data-tab="about">About</button>
                <button class="tab-button" data-tab="contact">Contact</button>
            </div>

            <!-- tab content -->
            <div class="tab-content">
                <!-- home -->
                <div id="home" class="tab-panel active">
                    <h2>Home</h2>
                    <p>...</p>
                    <div class="button-group">
                        <button class="nav-button" id="prev-button">← Previous</button>
                        <button class="nav-button" id="next-button">Next →</button>
                    </div>
                </div>

                <!-- gallery -->
                <div id="gallery" class="tab-panel">
                    <h2>Gallery</h2>
                    <p>...</p>
                    <div class="gallery-grid">
                        <div class="gallery-item">Artwork 1</div>
                        <div class="gallery-item">Artwork 2</div>
                        <div class="gallery-item">Artwork 3</div>
                        <div class="gallery-item">Artwork 4</div>
                    </div>
                    <div class="button-group">
                        <button class="nav-button" id="prev-button">← Previous</button>
                        <button class="nav-button" id="next-button">Next →</button>
                    </div>
                </div>

                <!-- about -->
                <div id="about" class="tab-panel">
                    <h2>About</h2>
                    <p>...</p>
                    <div class="button-group">
                        <button class="nav-button" id="prev-button">← Previous</button>
                        <button class="nav-button" id="next-button">Next →</button>
                    </div>
                </div>

                <!-- contact -->
                <div id="contact" class="tab-panel">
                    <h2>Contact</h2>
                    <p>Get in touch with me!</p>
                    <form id="contact-form">
                        <input type="text" placeholder="Your Name" required>
                        <input type="email" placeholder="Your Email" required>
                        <textarea placeholder="Your Message" required></textarea>
                        <button type="submit" class="cta-button">Send Message</button>
                    </form>
                    <div class="button-group">
                        <button class="nav-button" id="prev-button">← Previous</button>
                        <button class="nav-button" id="next-button">Next →</button>
                    </div>
                </div>
            </div>
        </div>

        <script src="scripts/script.js"></script>
    </body>
</html>
